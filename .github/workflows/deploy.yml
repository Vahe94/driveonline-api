name: Deploy Backend Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            mkdir -p /opt/driveonline/driveonline-next
            mkdir -p /opt/driveonline/driveonline-api

            cat > /opt/driveonline/driveonline-next/.env.production <<'EOF'
            ${{ secrets.FRONTEND_ENV_PRODUCTION }}
            EOF

            cat > /opt/driveonline/driveonline-api/.env.production <<'EOF'
            ${{ secrets.BACKEND_ENV_PRODUCTION }}
            EOF

            cd /opt/driveonline/driveonline-next
            git fetch --all
            git checkout main
            git pull origin main

            cd /opt/driveonline/driveonline-api
            git fetch --all
            git checkout main
            git pull origin main

            cd /opt/driveonline/driveonline-next
            docker compose -f deploy/docker-compose.prod.yml up -d --build
            docker compose -f deploy/docker-compose.prod.yml exec -T backend php artisan migrate --force
            docker compose -f deploy/docker-compose.prod.yml exec -T backend php artisan optimize
