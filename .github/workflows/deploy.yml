name: Build And Deploy Backend Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image references
        id: image_meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "frontend_image=ghcr.io/${owner}/driveonline-next" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${owner}/driveonline-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for image push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image_meta.outputs.backend_image }}:main
            ${{ steps.image_meta.outputs.backend_image }}:${{ github.sha }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            PROJECT_ROOT=/opt/driveonline
            DEPLOY_DIR="$PROJECT_ROOT/deploy"
            FRONTEND_ENV_FILE=/tmp/driveonline-frontend.env
            BACKEND_ENV_FILE=/tmp/driveonline-backend.env
            COMPOSE_ENV_FILE=/tmp/driveonline-compose.env
            LOCK_FILE=/tmp/driveonline-production-deploy.lock

            install -m 700 -d "$PROJECT_ROOT" "$DEPLOY_DIR"
            exec 9>"$LOCK_FILE"
            flock -n 9 || {
              echo "Another deployment is already running."
              exit 1
            }
            trap 'rm -f "$FRONTEND_ENV_FILE" "$BACKEND_ENV_FILE" "$COMPOSE_ENV_FILE"' EXIT

            if [ ! -f "$DEPLOY_DIR/docker-compose.prod.yml" ]; then
              echo "Missing $DEPLOY_DIR/docker-compose.prod.yml. Run the frontend deploy workflow once first."
              exit 1
            fi

            cat > "$FRONTEND_ENV_FILE" <<'EOF'
            ${{ secrets.FRONTEND_ENV_PRODUCTION }}
            EOF

            cat > "$BACKEND_ENV_FILE" <<'EOF'
            ${{ secrets.BACKEND_ENV_PRODUCTION }}
            EOF

            cat > "$COMPOSE_ENV_FILE" <<'EOF'
            ${{ secrets.COMPOSE_ENV_PRODUCTION }}
            EOF

            {
              echo "FRONTEND_IMAGE=${{ steps.image_meta.outputs.frontend_image }}:main"
              echo "BACKEND_IMAGE=${{ steps.image_meta.outputs.backend_image }}:main"
              echo "FRONTEND_RUNTIME_ENV_FILE=$FRONTEND_ENV_FILE"
              echo "BACKEND_RUNTIME_ENV_FILE=$BACKEND_ENV_FILE"
            } >> "$COMPOSE_ENV_FILE"

            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USERNAME }}" --password-stdin
            docker compose --env-file "$COMPOSE_ENV_FILE" -f "$DEPLOY_DIR/docker-compose.prod.yml" pull
            docker compose --env-file "$COMPOSE_ENV_FILE" -f "$DEPLOY_DIR/docker-compose.prod.yml" up -d
            docker compose --env-file "$COMPOSE_ENV_FILE" -f "$DEPLOY_DIR/docker-compose.prod.yml" exec -T backend php artisan migrate --force
            docker compose --env-file "$COMPOSE_ENV_FILE" -f "$DEPLOY_DIR/docker-compose.prod.yml" exec -T backend php artisan optimize
            docker logout ghcr.io || true
